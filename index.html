<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{

.container{max-width:800px;margin:0 auto;padding:16px}
.screen{display:none;animation:fadeIn 0.5s ease}

.app-header{background:linear-gradient(135deg,var(--green-800),var(--green-600));color:white;padding:20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}

.title-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--green-800) 0%,var(--green-600) 40%,var(--green-400) 100%);color:white;text-align:center;padding:32px 24px}

.title-screen h1{font-size:1.6rem;font-weight:700;line-height:1.5;margin-bottom:16px;text-shadow:0 2px 4px rgba(0,0,0,0.15)}
.title-screen .desc{font-size:0.9rem;opacity:0.9;max-width:520px;margin-bottom:32px;line-height:1.8}
.title-screen .source{font-size:0.7rem;opacity:0.6;margin-top:24px;max-width:400px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 40px;border:none;border-radius:50px;font-size:1rem;font-weight:600;cursor:pointer;transition:all 0.3s;font-family:inherit}
.btn-primary{background:white;color:var(--green-800);box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,0.2)}
.btn-green{background:var(--green-600);color:white;box-shadow:0 4px 16px rgba(58,157,106,0.3)}
.btn-green:hover{background:var(--green-700);transform:translateY(-2px)}
.btn-green:disabled{background:#9ab;cursor:not-allowed;transform:none;box-shadow:none}
.btn-outline{background:transparent;color:var(--green-700);border:2px solid var(--green-300);padding:12px 32px}
.btn-outline:hover{background:var(--green-50);border-color:var(--green-500)}
.region-group{margin-bottom:24px}
.region-title{font-size:0.85rem;font-weight:700;color:var(--green-700);padding:8px 16px;background:var(--green-100);border-radius:8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.city-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.city-btn{padding:10px 8px;background:white;border:2px solid var(--green-200);border-radius:var(--radius);text-align:center;cursor:pointer;font-size:0.85rem;font-weight:500;transition:all 0.2s;color:var(--text)}
.city-btn:hover{border-color:var(--green-500);background:var(--green-50);transform:translateY(-1px)}
.city-btn.selected{border-color:var(--green-600);background:var(--green-600);color:white}
.category-section{margin-bottom:28px}
.category-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:linear-gradient(90deg,var(--green-700),var(--green-600));color:white;border-radius:var(--radius) var(--radius) 0 0;font-weight:600;font-size:0.95rem}
.category-header .cat-icon{font-size:1.3rem}
.category-header .cat-count{margin-left:auto;font-size:0.75rem;opacity:0.8;background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:12px}
.option-list{background:white;border:1px solid var(--green-200);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden}
.option-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--green-100);cursor:pointer;transition:background 0.15s;position:relative}
.option-item:last-child{border-bottom:none}
.option-item:hover{background:var(--green-50)}
.option-item.checked{background:var(--green-100)}
.option-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--green-600);cursor:pointer;flex-shrink:0}
.option-name{flex:1;font-size:0.85rem;line-height:1.5}
.option-value{font-size:0.8rem;font-weight:700;color:var(--green-700);white-space:nowrap;background:var(--green-100);padding:3px 10px;border-radius:20px}
.option-item.checked .option-value{background:var(--green-600);color:white}
.phase-instruction{background:linear-gradient(135deg,var(--green-50),var(--blue-200));border:1px solid var(--green-200);border-radius:var(--radius-lg);padding:20px;margin-bottom:24px;text-align:center}
.phase-instruction h2{font-size:1.1rem;color:var(--green-800);margin-bottom:8px}
.phase-instruction p{font-size:0.85rem;color:var(--text-light)}
.result-card{background:white;border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-lg);margin-bottom:24px;text-align:center}
.result-card h2{font-size:1.2rem;color:var(--green-800);margin-bottom:20px}
.cfp-display{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.cfp-flow{display:flex;flex-direction:column;gap:0;align-items:center;margin-bottom:24px}
.cfp-step{display:flex;align-items:center;gap:16px;width:100%;max-width:400px;padding:16px 20px}
.cfp-step .cfp-icon{font-size:1.6rem;flex-shrink:0;width:40px;text-align:center}
.cfp-step .cfp-info{flex:1}
.cfp-step .cfp-label{font-size:0.75rem;color:var(--text-light)}
.cfp-step .cfp-val{font-size:1.8rem;font-weight:800;line-height:1.2}
.cfp-step .cfp-unit{font-size:0.7rem;color:var(--text-light)}
.cfp-arrow{font-size:1.2rem;color:var(--green-400);text-align:center;padding:2px 0}
.cfp-box{padding:16px 20px;border-radius:var(--radius);min-width:140px}
.cfp-box.current{background:var(--green-100);border:2px solid var(--green-400)}
.cfp-box.reduced{background:#e8f5e9;border:2px solid var(--green-500)}
.cfp-box.target{background:#fff3e0;border:2px solid var(--orange-500)}
.cfp-box.gap{background:#fce4ec;border:2px solid var(--red-500)}
.cfp-box .label{font-size:0.7rem;color:var(--text-light);margin-bottom:4px}
.cfp-box .value{font-size:1.5rem;font-weight:800}
.cfp-box .unit{font-size:0.7rem;color:var(--text-light)}
.progress-container{position:sticky;top:60px;z-index:90;background:white;padding:16px 16px 12px;border-bottom:1px solid var(--green-200);box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.progress-info{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.progress-info .progress-left{font-size:0.85rem;font-weight:600;color:var(--text)}
.progress-info .progress-right{font-size:0.9rem;font-weight:700}
.progress-info .progress-right.is-reached{color:var(--green-700)}
.progress-info .progress-right.is-gap{color:var(--orange-500)}
.progress-bar-outer{height:36px;background:var(--green-100);border-radius:18px;overflow:hidden;position:relative}
.progress-bar-inner{height:100%;border-radius:18px;transition:width 0.4s ease,background 0.4s;display:flex;align-items:center;justify-content:flex-end;padding-right:12px;font-size:0.85rem;font-weight:700;color:white;min-width:50px}
.progress-bar-inner.low{background:linear-gradient(90deg,var(--red-500),var(--orange-500))}
.progress-bar-inner.mid{background:linear-gradient(90deg,var(--orange-500),#f0c040)}
.progress-bar-inner.high{background:linear-gradient(90deg,var(--green-500),var(--green-400))}
.progress-bar-inner.complete{background:linear-gradient(90deg,var(--green-600),var(--green-400))}
.progress-status{text-align:center;margin-top:8px;font-size:0.8rem;font-weight:600}
.progress-status.reached{color:var(--green-700)}
.progress-status.not-reached{color:var(--orange-500)}

.final-section h3{font-size:0.95rem;color:var(--green-800);margin-bottom:12px;padding-left:8px;border-left:4px solid var(--green-500)}

.final-item .existing-badge{background:var(--blue-400);color:white;font-size:0.65rem;padding:2px 8px;border-radius:10px;font-weight:600}
.action-bar{position:sticky;bottom:0;background:white;padding:12px 16px;border-top:1px solid var(--green-200);text-align:center;box-shadow:0 -2px 8px rgba(0,0,0,0.05);z-index:90}

.mb-16{margin-bottom:16px}
.mb-24{margin-bottom:24px}

.cfp-box{min-width:unset;width:100%}

  .screen{display:block!important;animation:none}
  .result-card{box-shadow:none;border:1px solid #ddd}
  .final-section{break-inside:avoid}
  .final-list{box-shadow:none;border:1px solid #ddd}

  .print-footer{display:block!important;text-align:center;margin-top:30px;padding-top:16px;border-top:1px solid #ddd;font-size:0.7rem;color:#999}
}
.print-header,.print-footer{display:none}

.share-card-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}

.sc-cat-items{color:var(--text-light);line-height:1.6}
.sc-cat-item{display:flex;justify-content:space-between;gap:4px}
.sc-cat-item .sc-v{color:var(--green-700);font-weight:600;white-space:nowrap}
.final-cat-section{margin-bottom:20px}
.final-cat-header{display:flex;align-items:center;gap:8px;padding:10px 16px;background:linear-gradient(90deg,var(--green-700),var(--green-600));color:white;border-radius:var(--radius) var(--radius) 0 0;font-weight:600;font-size:0.9rem}
.final-cat-header .fc-icon{font-size:1.2rem}
.final-cat-header .fc-subtotal{margin-left:auto;font-size:0.75rem;opacity:0.85;background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:12px}
@media(max-width:600px){
.share-card-metrics{grid-template-columns:1fr}
.share-card-cats{grid-template-columns:1fr}
}
</style>
</head>

let state = { screen:'title', cityIndex:-1, phase1Checked:new Set(), phase2Checked:new Set() };

function getCityData() { return CITIES_DATA[state.cityIndex]; }

function getConflicted(selectedSet) {
  const conflicted = new Set();
  for (const sel of selectedSet) {
    if (CONFLICTS[sel]) { for (const c of CONFLICTS[sel]) conflicted.add(c); }
  }
  return conflicted;
}

function calcReduction(selectedSet, cityData) {
  let total = 0;
  for (const opt of selectedSet) { if (cityData.options[opt] !== undefined) total += cityData.options[opt]; }
  return total;
}

const app = document.getElementById('app');

function render() {
  const renderers = { title:renderTitle, city:renderCity, phase1:renderPhase1, result1:renderResult1, phase2:renderPhase2, final:renderFinal };
  if (renderers[state.screen]) renderers[state.screen]();
  window.scrollTo(0, 0);
}

function goTo(screen) { state.screen = screen; render(); }

function selectCity(idx) {
  state.cityIndex = idx;
  state.phase1Checked = new Set();
  state.phase2Checked = new Set();
  renderCity();
}

function togglePhase1(opt) {
  const sy = window.scrollY;
  if (state.phase1Checked.has(opt)) state.phase1Checked.delete(opt); else state.phase1Checked.add(opt);
  renderPhase1();
  window.scrollTo(0, sy);
}

function togglePhase2(opt) {
  const sy = window.scrollY;
  if (state.phase2Checked.has(opt)) state.phase2Checked.delete(opt); else state.phase2Checked.add(opt);
  renderPhase2();
  window.scrollTo(0, sy);
}

function esc(s) { return s.replace(/'/g, "\\'"); }

function renderTitle() {
  app.innerHTML = '<div class="title-screen screen active">' +
    '<div class="leaf-icon">\u{1F33F}</div>' +

    '<button class="btn btn-primary" onclick="goTo(\'city\')">はじめる →</button>' +
    '<p class="source">出典：国立環境研究所・地球環境戦略研究機関<br>「国内52都市における脱炭素型ライフスタイルの選択肢」(2021)</p>' +
    '</div>';
}

function renderCity() {

  h += '<div class="container screen active"><div class="info-box"><strong>52の都市</strong>から、あなたがお住まいの地域に最も近い都市を選択してください。選んだ都市のデータに基づいて、カーボンフットプリントを計算します。</div>';
  for (const region of REGIONS) {
    h += '<div class="region-group"><div class="region-title">\u{1F4CD} ' + region.name + '</div><div class="city-grid">';
    for (const cn of region.cities) {
      const idx = CITIES_DATA.findIndex(c => c.name === cn);
      if (idx >= 0) {
        const sel = state.cityIndex === idx ? ' selected' : '';
        h += '<div class="city-btn' + sel + '" onclick="selectCity(' + idx + ')">' + cn + '<br><span style="font-size:0.7rem;opacity:0.6">' + CITIES_DATA[idx].cfp.toLocaleString() + ' kg</span></div>';
      }
    }
    h += '</div></div>';
  }
  h += '</div><div class="action-bar"><button class="btn btn-green" ' + (state.cityIndex < 0 ? 'disabled' : '') + ' onclick="goTo(\'phase1\')">この都市で診断する →</button></div>';

}

function renderPhase1() {
  const city = getCityData();
  const p1Conf = getConflicted(state.phase1Checked);
  let h = '<div class="app-header"><button class="back-btn" onclick="goTo(\'city\')">←</button><h1>' + city.name + 'のライフスタイル診断</h1><div class="subtitle">現在のCFP：' + city.cfp.toLocaleString() + ' kgCO2e/人/年</div></div>';
  h += '<div class="container screen active"><div class="phase-instruction"><h2>Step 1：今の暮らしを教えてください</h2><p>以下の選択肢の中から、<strong>1年間を通して常に実践できている</strong>ものにチェックを入れてください。<br>「ちょっとやっている」ではなく、ライフスタイルとして定着しているものを選びましょう。</p></div>';
  for (const cat of CATEGORIES) {
    const catOpts = cat.options.filter(o => city.options[o] !== undefined);
    const cc = catOpts.filter(o => state.phase1Checked.has(o)).length;
    h += '<div class="category-section"><div class="category-header"><span class="cat-icon">' + cat.icon + '</span>' + cat.name + '<span class="cat-count">' + cc + '/' + catOpts.length + '</span></div><div class="option-list">';
    for (const opt of catOpts) {
      const chk = state.phase1Checked.has(opt);
      const blocked = !chk && p1Conf.has(opt);
      h += '<label class="option-item' + (chk ? ' checked' : '') + '" style="' + (blocked ? 'opacity:0.4;pointer-events:none' : '') + '"><input type="checkbox" ' + (chk ? 'checked' : '') + ' ' + (blocked ? 'disabled' : '') + ' onchange="togglePhase1(\'' + esc(opt) + '\')"><span class="option-name">' + opt + (blocked ? ' <span style="font-size:0.7rem;color:#999">(他の選択と重複)</span>' : '') + '</span></label>';
    }
    h += '</div></div>';
  }
  h += '</div><div class="action-bar"><button class="btn btn-green" onclick="goTo(\'result1\')">全て選択した ✓</button></div>';
  app.innerHTML = h;
}

function renderResult1() {
  const city = getCityData();
  const reduction = calcReduction(state.phase1Checked, city);
  const currentCFP = city.cfp - reduction;
  const gap = currentCFP - city.target;
  const pct = Math.round((reduction / (city.cfp - city.target)) * 100);

  let h = '<div class="app-header"><button class="back-btn" onclick="goTo(\'phase1\')">←</button><h1>現在のライフスタイル診断結果</h1><div class="subtitle">' + city.name + '</div></div>';
  h += '<div class="container screen active"><div class="result-card"><h2>\u{1F30D} あなたの現在地</h2>';
  h += '<div class="cfp-flow">';
  h += '<div class="cfp-step"><div class="cfp-icon">\u{1F3D9}\u{FE0F}</div><div class="cfp-info"><div class="cfp-label">' + city.name + 'の平均CFP</div><div class="cfp-val">' + city.cfp.toLocaleString() + ' <span class="cfp-unit">kgCO2e/人/年</span></div></div></div>';
  h += '<div class="cfp-arrow">\u{2193}</div>';
  h += '<div class="cfp-step" style="background:var(--green-50);border-radius:var(--radius)"><div class="cfp-icon">\u{2705}</div><div class="cfp-info"><div class="cfp-label">あなたの実践による削減</div><div class="cfp-val" style="color:var(--green-600)">-' + reduction.toLocaleString() + ' <span class="cfp-unit">kgCO2e</span></div></div></div>';
  h += '<div class="cfp-arrow">\u{2193}</div>';
  h += '<div class="cfp-step" style="background:' + (gap > 0 ? '#fff8f0' : '#f0faf2') + ';border-radius:var(--radius)"><div class="cfp-icon">' + (gap > 0 ? '\u{1F4CD}' : '\u{1F389}') + '</div><div class="cfp-info"><div class="cfp-label">あなたの現在のCFP</div><div class="cfp-val" style="color:' + (gap > 0 ? 'var(--orange-500)' : 'var(--green-600)') + '">' + currentCFP.toLocaleString() + ' <span class="cfp-unit">kgCO2e/人/年</span></div></div></div>';
  h += '<div class="cfp-arrow" style="font-size:0.8rem;color:var(--text-light);padding:8px 0">\u{2500}\u{2500}\u{2500} 2030年目標：' + city.target.toLocaleString() + ' kgCO2e \u{2500}\u{2500}\u{2500}</div>';
  h += '<div class="cfp-step" style="background:' + (gap > 0 ? '#fce4ec' : '#e8f5e9') + ';border-radius:var(--radius);border:2px solid ' + (gap > 0 ? 'var(--red-500)' : 'var(--green-500)') + '"><div class="cfp-icon">' + (gap > 0 ? '\u{26A1}' : '\u{2728}') + '</div><div class="cfp-info"><div class="cfp-label">' + (gap > 0 ? 'あと必要な削減量' : '目標達成！') + '</div><div class="cfp-val" style="color:' + (gap > 0 ? 'var(--red-500)' : 'var(--green-700)') + '">' + (gap > 0 ? '-' + gap.toLocaleString() + ' <span class="cfp-unit">kgCO2e</span>' : '余裕あり +' + Math.abs(gap).toLocaleString() + ' kgCO2e') + '</div></div></div>';
  h += '</div>';
  
  const barPct = Math.min(pct, 100);
  const barClass = barPct >= 100 ? 'complete' : barPct >= 60 ? 'high' : barPct >= 30 ? 'mid' : 'low';
  h += '<div style="margin-top:20px"><div style="display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text-light);margin-bottom:4px"><span>削減進捗</span><span>' + barPct + '%</span></div>';
  h += '<div class="progress-bar-outer"><div class="progress-bar-inner ' + barClass + '" style="width:' + barPct + '%">' + barPct + '%</div></div></div></div>';

  if (state.phase1Checked.size > 0) {
    h += '<div class="info-box"><strong>すでに実践していること（' + state.phase1Checked.size + '項目）</strong><br>';
    const items = [...state.phase1Checked].map(o => '・' + o + '（-' + city.options[o].toLocaleString() + 'kg）');
    h += items.join('<br>') + '</div>';
  } else {
    h += '<div class="info-box">まだ脱炭素型ライフスタイルの選択肢を実践していない状態です。次のステップで、目指すライフスタイルを探りましょう。</div>';
  }

  if (gap > 0) {
    h += '<div class="text-center mt-24"><p class="mb-16" style="font-size:0.9rem;color:var(--text-light)">目標達成にはあと<strong style="color:var(--red-500);font-size:1.2rem">' + gap.toLocaleString() + ' kg</strong>の削減が必要です。<br>次のステップで、目指すライフスタイルを一緒に考えましょう。</p>';
    h += '<button class="btn btn-green" onclick="goTo(\'phase2\')">目指すライフスタイルを考える →</button></div>';
  } else {
    h += '<div class="text-center mt-24"><p class="mb-16" style="font-size:0.9rem;color:var(--green-700)">素晴らしい！すでに目標を達成しています！<br>さらなる削減の可能性も探ってみましょう。</p>';
    h += '<button class="btn btn-green" onclick="goTo(\'phase2\')">さらに探る →</button></div>';
  }
  h += '</div>';
  app.innerHTML = h;
}

function renderPhase2() {
  const city = getCityData();
  const p1Red = calcReduction(state.phase1Checked, city);
  const p2Red = calcReduction(state.phase2Checked, city);
  const totalRed = p1Red + p2Red;
  const currentCFP = city.cfp - totalRed;
  const totalNeeded = city.cfp - city.target;
  const gap = currentCFP - city.target;
  const pct = Math.min(Math.round((totalRed / totalNeeded) * 100), 100);
  const reached = gap <= 0;

  const excluded = new Set(state.phase1Checked);
  const p1Conf = getConflicted(state.phase1Checked);
  for (const c of p1Conf) excluded.add(c);

  let h = '<div class="app-header"><button class="back-btn" onclick="goTo(\'result1\')">←</button><h1>目指すライフスタイル</h1><div class="subtitle">' + city.name + '</div></div>';
  
  const barClass = reached ? 'complete' : pct >= 60 ? 'high' : pct >= 30 ? 'mid' : 'low';
  h += '<div class="progress-container"><div class="progress-info"><span class="progress-left">削減量 ' + totalRed.toLocaleString() + ' / ' + totalNeeded.toLocaleString() + ' kgCO2e</span><span class="progress-right ' + (reached ? 'is-reached' : 'is-gap') + '">' + (reached ? '\u{1F389} 目標達成！' : 'あと ' + gap.toLocaleString() + ' kg') + '</span></div>';
  h += '<div class="progress-bar-outer"><div class="progress-bar-inner ' + barClass + '" style="width:' + pct + '%">' + pct + '%</div></div>';
  h += '<div class="progress-status ' + (reached ? 'reached' : 'not-reached') + '">' + (reached ? '\u{2728} 1.5℃目標に十分なライフスタイルです！' : '\u{26A1} チェックを入れたり外したりしながら、目標達成の組み合わせを探りましょう') + '</div></div>';

  h += '<div class="container screen active"><div class="phase-instruction"><h2>Step 2：これから取り組むことを選ぶ</h2><p>チェックボックスを入れたり外したりしながら、<strong>目標達成に向けた組み合わせ</strong>を探ってみましょう。<br>各選択肢の右に表示される数値が、その行動による削減効果です。</p></div>';

  const p2Conf = getConflicted(state.phase2Checked);
  for (const cat of CATEGORIES) {
    const catOpts = cat.options.filter(o => city.options[o] !== undefined && !excluded.has(o));
    if (catOpts.length === 0) continue;
    const cc = catOpts.filter(o => state.phase2Checked.has(o)).length;
    h += '<div class="category-section"><div class="category-header"><span class="cat-icon">' + cat.icon + '</span>' + cat.name + '<span class="cat-count">' + cc + '/' + catOpts.length + '</span></div><div class="option-list">';
    for (const opt of catOpts) {
      const v = city.options[opt];
      const chk = state.phase2Checked.has(opt);
      const blocked = !chk && p2Conf.has(opt);
      h += '<label class="option-item' + (chk ? ' checked' : '') + '" style="' + (blocked ? 'opacity:0.4;pointer-events:none' : '') + '"><input type="checkbox" ' + (chk ? 'checked' : '') + ' ' + (blocked ? 'disabled' : '') + ' onchange="togglePhase2(\'' + esc(opt) + '\')"><span class="option-name">' + opt + (blocked ? ' <span style="font-size:0.7rem;color:#999">(他の選択と重複)</span>' : '') + '</span><span class="option-value">-' + v.toLocaleString() + ' kg</span></label>';
    }
    h += '</div></div>';
  }
  h += '</div><div class="action-bar"><button class="btn btn-green" onclick="goTo(\'final\')">このライフスタイルに決定 ✓</button></div>';
  app.innerHTML = h;
}

function renderFinal() {
  const city = getCityData();
  const p1Red = calcReduction(state.phase1Checked, city);
  const p2Red = calcReduction(state.phase2Checked, city);
  const totalRed = p1Red + p2Red;
  const finalCFP = city.cfp - totalRed;
  const totalNeeded = city.cfp - city.target;
  const reached = finalCFP <= city.target;
  const pct = Math.min(Math.round((totalRed / totalNeeded) * 100), 100);
  const barClass = reached ? 'complete' : pct >= 60 ? 'high' : pct >= 30 ? 'mid' : 'low';

  const p1List = [...state.phase1Checked].sort((a, b) => (city.options[b] || 0) - (city.options[a] || 0));
  const p2List = [...state.phase2Checked].sort((a, b) => (city.options[b] || 0) - (city.options[a] || 0));

  let h = '<div class="app-header"><button class="back-btn" onclick="goTo(\'phase2\')">←</button><h1>あなたの目指すライフスタイル</h1><div class="subtitle">' + city.name + '</div></div>';
  h += '<div class="print-header"><h1>脱炭素型ライフスタイル診断結果 — ' + city.name + '</h1><p>2030年目標：' + city.target.toLocaleString() + ' kgCO2e/人/年</p></div>';
  h += '<div class="container screen active"><div class="result-card"><h2>' + (reached ? '\u{1F31F} 目標達成！' : '\u{1F331} あなたのライフスタイル計画') + '</h2>';
  h += '<div class="cfp-display"><div class="cfp-box current"><div class="label">' + city.name + 'の平均</div><div class="value">' + city.cfp.toLocaleString() + '</div><div class="unit">kgCO2e/人/年</div></div>';
  h += '<div class="cfp-box ' + (reached ? 'reduced' : 'gap') + '"><div class="label">あなたの目標CFP</div><div class="value" style="color:' + (reached ? 'var(--green-600)' : 'var(--orange-500)') + '">' + finalCFP.toLocaleString() + '</div><div class="unit">kgCO2e/人/年</div></div></div>';
  h += '<div style="font-size:0.9rem;color:var(--text-light);margin-top:8px">合計削減量：<strong style="color:var(--green-700)">' + totalRed.toLocaleString() + ' kgCO2e</strong>（' + pct + '%達成）</div>';
  h += '<div style="margin-top:16px"><div class="progress-bar-outer"><div class="progress-bar-inner ' + barClass + '" style="width:' + pct + '%">' + pct + '%</div></div></div></div>';

  function renderCatBlock(title, items, badge, badgeClass) {
    if (items.length === 0) return '';
    var out = '<div class="final-section"><h3>' + title + '</h3>';
    for (var ci = 0; ci < CATEGORIES.length; ci++) {
      var cat = CATEGORIES[ci];
      var catItems = cat.options.filter(function(o) { return items.indexOf(o) >= 0; });
      if (catItems.length === 0) continue;
      var catRed = 0;
      for (var j = 0; j < catItems.length; j++) catRed += (city.options[catItems[j]] || 0);
      out += '<div class="final-cat-section"><div class="final-cat-header"><span class="fc-icon">' + cat.icon + '</span>' + cat.name + '<span class="fc-subtotal">-' + catRed.toLocaleString() + ' kg</span></div><div class="final-list">';
      for (var j = 0; j < catItems.length; j++) {
        var o = catItems[j];
        out += '<div class="final-item"><span class="check-mark">✓</span><span class="' + badgeClass + '">' + badge + '</span><span style="flex:1">' + o + '</span><span class="option-value">-' + city.options[o].toLocaleString() + ' kg</span></div>';
      }
      out += '</div></div>';
    }
    out += '</div>';
    return out;
  }
  h += renderCatBlock('\u{1F535} すでに実践していること（' + p1List.length + '項目）', p1List, '実践中', 'existing-badge');
  h += renderCatBlock('\u{1F7E2} これから取り組むこと（' + p2List.length + '項目）', p2List, 'NEW', 'new-badge');

  // 共有カード
  h += '<div class="share-card"><div class="share-card-header"><span style="font-size:1.4rem">\u{1F33F}</span><span class="sc-city">' + city.name + ' — 私の脱炭素ライフスタイル</span><span class="sc-date">' + new Date().toLocaleDateString('ja-JP') + '</span></div>';
  h += '<div class="share-card-metrics"><div class="sc-metric"><div class="sc-m-label">現在のCFP</div><div class="sc-m-value" style="color:var(--green-700)">' + finalCFP.toLocaleString() + '</div><div class="sc-m-unit">kgCO2e/人/年</div></div>';
  h += '<div class="sc-metric"><div class="sc-m-label">削減量合計</div><div class="sc-m-value" style="color:var(--green-600)">-' + totalRed.toLocaleString() + '</div><div class="sc-m-unit">kgCO2e</div></div>';
  h += '<div class="sc-metric" style="background:' + (reached ? '#e8f5e9' : '#fff3e0') + '"><div class="sc-m-label">' + (reached ? '目標達成!' : 'あと必要') + '</div><div class="sc-m-value" style="color:' + (reached ? 'var(--green-700)' : 'var(--orange-500)') + '">' + (reached ? pct + '%' : (finalCFP - city.target).toLocaleString()) + '</div><div class="sc-m-unit">' + (reached ? '達成率' : 'kgCO2e') + '</div></div></div>';
  h += '<div class="share-card-cats">';
  for (var ci = 0; ci < CATEGORIES.length; ci++) {
    var cat = CATEGORIES[ci];
    var allSel = cat.options.filter(function(o) { return state.phase1Checked.has(o) || state.phase2Checked.has(o); });
    if (allSel.length === 0) { h += '<div class="sc-cat"><div class="sc-cat-title">' + cat.icon + ' ' + cat.name + '</div><div class="sc-cat-items" style="color:#bbb">— 選択なし</div></div>'; continue; }
    var catRed = 0;
    h += '<div class="sc-cat"><div class="sc-cat-title">' + cat.icon + ' ' + cat.name + ' (' + allSel.length + ')</div><div class="sc-cat-items">';
    for (var j = 0; j < allSel.length; j++) {
      var o = allSel[j];
      var v = city.options[o] || 0;
      catRed += v;
      var isNew = state.phase2Checked.has(o);
      h += '<div class="sc-cat-item"><span>' + (isNew ? '<span style="background:var(--green-500);color:white;font-size:0.6rem;padding:1px 5px;border-radius:6px;margin-right:4px">NEW</span>' : '<span style="background:var(--blue-400);color:white;font-size:0.6rem;padding:1px 5px;border-radius:6px;margin-right:4px">実践中</span>') + o + '</span><span class="sc-v">-' + v.toLocaleString() + '</span></div>';
    }
    h += '</div></div>';
  }
  h += '</div></div>';
  h += '<div class="text-center mt-24 mb-24"><button class="btn btn-outline no-print" onclick="goTo(\'phase2\')">← 選択を見直す</button> <button class="btn btn-green no-print" onclick="savePDF()" style="margin-left:12px">PDFで保存</button> <button class="btn btn-outline no-print" onclick="goTo(\'title\')" style="margin-left:12px">最初からやり直す</button></div>';
  h += '<div class="print-footer">出典：国立環境研究所・地球環境戦略研究機関「国内52都市における脱炭素型ライフスタイルの選択肢」(2021)<br>生成日：' + new Date().toLocaleDateString('ja-JP') + '</div></div>';
  app.innerHTML = h;
}

function savePDF() {
  var btn = document.querySelector('.no-print[onclick="savePDF()"]');
  if (btn) { btn.textContent = '生成中...'; btn.disabled = true; }
  var target = document.getElementById('app');
  var noPrintEls = target.querySelectorAll('.no-print');
  noPrintEls.forEach(function(el) { el.style.display = 'none'; });
  var printHeader = target.querySelector('.print-header');
  var printFooter = target.querySelector('.print-footer');
  if (printHeader) printHeader.style.display = 'block';
  if (printFooter) printFooter.style.display = 'block';
  var appHeader = target.querySelector('.app-header');
  if (appHeader) appHeader.style.display = 'none';
  html2canvas(target, {
    scale: 2,
    useCORS: true,
    backgroundColor: '#f5faf6',
    windowWidth: 800
  }).then(function(canvas) {
    var imgData = canvas.toDataURL('image/jpeg', 0.92);
    var pdf = new jspdf.jsPDF('p', 'mm', 'a4');
    var pdfW = pdf.internal.pageSize.getWidth();
    var pdfH = pdf.internal.pageSize.getHeight();
    var margin = 8;
    var contentW = pdfW - margin * 2;
    var imgH = canvas.height * contentW / canvas.width;
    var y = 0;
    var pageContentH = pdfH - margin * 2;
    while (y < imgH) {
      if (y > 0) pdf.addPage();
      var srcY = y * canvas.width / contentW;
      var srcH = pageContentH * canvas.width / contentW;
      if (srcY + srcH > canvas.height) srcH = canvas.height - srcY;
      var sliceH = srcH * contentW / canvas.width;
      var sliceCanvas = document.createElement('canvas');
      sliceCanvas.width = canvas.width;
      sliceCanvas.height = srcH;
      var ctx = sliceCanvas.getContext('2d');
      ctx.drawImage(canvas, 0, srcY, canvas.width, srcH, 0, 0, canvas.width, srcH);
      var sliceData = sliceCanvas.toDataURL('image/jpeg', 0.92);
      pdf.addImage(sliceData, 'JPEG', margin, margin, contentW, sliceH);
      y += pageContentH;
    }
    var cityName = state.city || 'result';
    pdf.save('carbon_lifestyle_' + cityName + '.pdf');
    noPrintEls.forEach(function(el) { el.style.display = ''; });
    if (printHeader) printHeader.style.display = 'none';
    if (printFooter) printFooter.style.display = 'none';
    if (appHeader) appHeader.style.display = '';
    if (btn) { btn.textContent = 'PDFで保存'; btn.disabled = false; }
  }).catch(function(err) {
    alert('PDF生成に失敗しました。もう一度お試しください。');
    noPrintEls.forEach(function(el) { el.style.display = ''; });
    if (printHeader) printHeader.style.display = 'none';
    if (printFooter) printFooter.style.display = 'none';
    if (appHeader) appHeader.style.display = '';
    if (btn) { btn.textContent = 'PDFで保存'; btn.disabled = false; }
  });
}

render();
</script></body></html>
